<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Image Gallery</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <div class="header-top">
                    <h1 class="gallery-title">Modern Image Gallery</h1>
                    <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
                        <i class="fas fa-moon"></i>
                    </button>
                </div>
                <p class="gallery-subtitle">Explore our collection of stunning images</p>
            </div>
        </header>

        <!-- Filter Controls -->
        <section class="filter-section">
            <h2>Filter by Category</h2>
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">
                    <i class="fas fa-images"></i> All
                </button>
                <button class="filter-btn" data-filter="nature">
                    <i class="fas fa-leaf"></i> Nature
                </button>
                <button class="filter-btn" data-filter="architecture">
                    <i class="fas fa-building"></i> Architecture
                </button>
                <button class="filter-btn" data-filter="people">
                    <i class="fas fa-users"></i> People
                </button>
                <button class="filter-btn" data-filter="technology">
                    <i class="fas fa-microchip"></i> Technology
                </button>
            </div>
        </section>

        <!-- Gallery Grid -->
        <section class="gallery">
            <div class="gallery-grid" id="galleryGrid">
                <!-- Gallery items will be inserted here by JavaScript -->
            </div>
        </section>

        <!-- Pagination -->
        <div class="pagination" id="pagination"></div>
    </div>

    <!-- Lightbox Modal -->
    <div class="lightbox" id="lightbox">
        <div class="lightbox-content">
            <span class="lightbox-close">&times;</span>
            
            <button class="lightbox-nav prev-btn" id="prevBtn">
                <i class="fas fa-chevron-left"></i>
            </button>
            
            <div class="lightbox-image-container">
                <img class="lightbox-image" id="lightboxImage" src="" alt="Gallery image">
                <div class="lightbox-info">
                    <h3 id="lightboxTitle"></h3>
                    <p id="lightboxDescription"></p>
                </div>
            </div>
            
            <button class="lightbox-nav next-btn" id="nextBtn">
                <i class="fas fa-chevron-right"></i>
            </button>

            <div class="lightbox-counter" id="imageCounter"></div>
        </div>
        <div class="lightbox-overlay"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
